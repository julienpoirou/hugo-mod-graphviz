name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: "0.159.0"
          extended: true

      - name: Build sample site
        shell: bash
        run: |
          set -euo pipefail
          SITE_DIR="${RUNNER_TEMP}/site"
          OUT_DIR="${RUNNER_TEMP}/public"
          mkdir -p "${SITE_DIR}/content" "${SITE_DIR}/assets/renderers" "${SITE_DIR}/layouts/_default" "${SITE_DIR}/_modules"
          ln -s "${GITHUB_WORKSPACE}" "${SITE_DIR}/_modules/hugo-mod-graphviz"

          cat > "${SITE_DIR}/layouts/_default/single.html" <<'EOF'
          <!DOCTYPE html>
          <html><body>{{ .Content }}</body></html>
          EOF

          cat > "${SITE_DIR}/layouts/_default/list.html" <<'EOF'
          <!DOCTYPE html>
          <html><body>{{ .Content }}</body></html>
          EOF

          cat > "${SITE_DIR}/hugo.toml" <<'EOF'
          baseURL = "https://example.org/"
          [module]
            [[module.mounts]]
              source = "content"
              target = "content"
            [[module.mounts]]
              source = "assets"
              target = "assets"
            [[module.mounts]]
              source = "layouts"
              target = "layouts"
            [[module.mounts]]
              source = "_modules/hugo-mod-graphviz/layouts"
              target = "layouts"
            [[module.mounts]]
              source = "_modules/hugo-mod-graphviz/static"
              target = "static"
          EOF

          cat > "${SITE_DIR}/assets/renderers/graphviz.dot" <<'EOF'
          digraph {
            A -> B;
            B -> "Graph";
          }
          EOF

          B64_SOURCE=$(printf 'digraph { X -> Y; }' | base64 -w0)

          cat > "${SITE_DIR}/content/test.md" <<EOF
          ---
          title: "Graphviz test"
          ---

          {{< graphviz src="renderers/graphviz.dot" />}}

          {{< graphviz >}}
          digraph {
            "Début" -> "École n°1";
          }
          {{< /graphviz >}}

          {{< graphviz b64="${B64_SOURCE}" />}}
          EOF

          hugo --source "${SITE_DIR}" --destination "${OUT_DIR}"
          PAGE="${OUT_DIR}/test/index.html"

          # Assets injected, and only once for the whole page.
          grep -q 'vendor/hugo-mod-graphviz/hugo-mod-graphviz.js' "${PAGE}"
          test "$(grep -c 'hugo-mod-graphviz.js' "${PAGE}")" -eq 1

          # All three input modes produce a wrapper.
          test "$(grep -c 'data-hugo-mod-graphviz' "${PAGE}")" -eq 3

          # Inline UTF-8 source survives the base64 round-trip untouched.
          # Hugo escapes "+" as "&#43;" in attributes; browsers unescape it,
          # so the assertion must do the same before decoding.
          grep -o 'data-source="[^"]*"' "${PAGE}" | sed -n '2p' \
            | sed 's/data-source="//;s/"$//;s/&#43;/+/g' | base64 -d \
            | grep -q "École n°1"

          # An empty source must fail the build explicitly.
          cat > "${SITE_DIR}/content/invalid.md" <<'EOF'
          ---
          title: "invalid"
          ---

          {{< graphviz >}}
          {{< /graphviz >}}
          EOF
          if hugo --source "${SITE_DIR}" --destination "${RUNNER_TEMP}/public-invalid"; then
            echo "expected the build to fail on an empty shortcode source" >&2
            exit 1
          fi

      - name: Build-time rendering (graphviz-static)
        shell: bash
        run: |
          set -euo pipefail
          SITE_DIR="${RUNNER_TEMP}/site"

          # Remove the intentionally-invalid page from the previous step's
          # negative test; otherwise it fails every subsequent full-site build.
          rm -f "${SITE_DIR}/content/invalid.md"

          printf 'digraph {\n  "Début" -> "École n°1";\n}\n' > "${SITE_DIR}/assets/static-diagram.dot"

          cat > "${SITE_DIR}/content/static-test.md" <<'EOF'
          ---
          title: "Graphviz static test"
          ---

          {{< graphviz-static src="static-diagram.dot" alt="Static diagram" >}}
          EOF

          node "${SITE_DIR}/_modules/hugo-mod-graphviz/scripts/render-graphviz.js" "${SITE_DIR}"
          test -f "${SITE_DIR}/static/generated/graphviz/static-diagram.svg"
          grep -q '<svg' "${SITE_DIR}/static/generated/graphviz/static-diagram.svg"
          grep -q 'École n°1' "${SITE_DIR}/static/generated/graphviz/static-diagram.svg"

          # Incremental: a second run must render nothing (source unchanged).
          if [ -n "$(node "${SITE_DIR}/_modules/hugo-mod-graphviz/scripts/render-graphviz.js" "${SITE_DIR}")" ]; then
            echo "expected the second run to skip an already up-to-date diagram" >&2
            exit 1
          fi

          hugo --source "${SITE_DIR}" --destination "${RUNNER_TEMP}/public-static"
          grep -q '/generated/graphviz/static-diagram.svg' "${RUNNER_TEMP}/public-static/static-test/index.html"

          # An invalid DOT source must fail the render script and leave no
          # partial output behind.
          printf 'digraph { not valid [[[ \n' > "${SITE_DIR}/assets/broken.dot"
          if node "${SITE_DIR}/_modules/hugo-mod-graphviz/scripts/render-graphviz.js" "${SITE_DIR}"; then
            echo "expected render-graphviz.js to fail on invalid DOT" >&2
            exit 1
          fi
          test ! -f "${SITE_DIR}/static/generated/graphviz/broken.svg"
